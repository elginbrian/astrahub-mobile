name: astrahub
description: "AstraHub Mobile - Clean Architecture & MVVM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI ─────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ── State Management ───────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation / Routing ───────────────────────────────────────────
  go_router: ^14.8.1

  # ── Networking ─────────────────────────────────────────────────────
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # ── Local Storage ──────────────────────────────────────────────────
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ── Serialization ──────────────────────────────────────────────────
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # ── Dependency Injection ───────────────────────────────────────────
  get_it: ^8.0.3

  # ── Utilities ──────────────────────────────────────────────────────
  dartz: ^0.10.1
  equatable: ^2.0.7
  intl: ^0.20.2
  logger: ^2.5.0
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation ────────────────────────────────────────────────
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
